  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #FDF6F9;
      font-family: 'Fredoka One', sans-serif;
      transition: background 0.5s ease;
      touch-action: manipulation;
    }

    @media (prefers-color-scheme: dark) {
      body { background: #1a1118; }
    }

    .stage {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      padding: 1rem;
      user-select: none;
      -webkit-user-select: none;
    }

    /* Fixed-height blob area so counter doesn't shift when blob grows */
    .blob-area {
      height: 290px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin-bottom: -0.25rem;
    }

    .blob-wrap {
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    /* SVG blob */
    #blob {
      transform-origin: center bottom;
      will-change: transform;
      overflow: visible;
      transition: width 0.35s ease, height 0.35s ease;
    }

    /* SVG face elements */
    .eye {
      transform-box: fill-box;
      transform-origin: center;
      transition: transform 0.08s;
    }
    #blob.squishing .eye {
      transform: scaleY(0.25);
    }
    #svgMouth {
      transform-box: fill-box;
      transform-origin: center;
      transition: transform 0.08s;
    }
    #blob.squishing #svgMouth {
      transform: scaleX(1.25);
    }

    .shadow {
      width: 110px;
      height: 14px;
      border-radius: 50%;
      background: #D4537E;
      opacity: 0.2;
      margin-top: 10px;
      transform-origin: center;
      will-change: transform;
    }

    .counter {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .count {
      font-size: 52px;
      line-height: 1;
      min-width: 3ch;
      text-align: center;
      transition: color 0.3s ease;
    }

    .count.pop { animation: countpop 0.25s ease-out forwards; }

    @keyframes countpop {
      0%   { transform: scale(1);    }
      50%  { transform: scale(1.35); }
      100% { transform: scale(1);    }
    }

    @keyframes countpulse {
      0%   { transform: scale(1);    }
      40%  { transform: scale(1.45); }
      100% { transform: scale(1);    }
    }

    .count.pulse {
      animation: countpulse 0.4s ease-out forwards;
    }

    .label {
      font-size: 16px;
      opacity: 0.7;
      letter-spacing: 0.03em;
      transition: color 0.3s ease;
    }

    .frenzy-label {
      font-size: 18px;
      letter-spacing: 0.06em;
      opacity: 0;
      transition: opacity 0.2s, color 0.3s;
      min-height: 1.4em;
      text-align: center;
    }

    .hint {
      font-family: sans-serif;
      font-size: 14px;
      color: #993556;
      opacity: 0.45;
      transition: opacity 0.5s;
    }
    .hint.hidden { opacity: 0; pointer-events: none; }

    @media (prefers-color-scheme: dark) {
      .hint { color: #F4C0D1; }
      .progress-dot         { background: transparent; opacity: 1; box-shadow: 0 0 0 1.5px #fff; }
      .progress-dot.filled  { background: #fff;        opacity: 1; box-shadow: none; }
    }

    .particle {
      position: fixed;
      pointer-events: none;
      z-index: 999;
      will-change: transform, opacity;
    }

    .ripple {
      position: fixed;
      border-radius: 50%;
      border: 5px solid;
      pointer-events: none;
      z-index: 998;
      will-change: transform, opacity;
    }

    .progress-dots {
      display: flex;
      gap: 7px;
      align-items: center;
      justify-content: center;
      min-height: 10px;
    }

    .progress-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: currentColor;
      opacity: 0.18;
      transition: opacity 0.3s, transform 0.3s;
    }

    .progress-dot.filled {
      opacity: 0.6;
      transform: scale(1.2);
    }

    @keyframes dotevolve {
      0%   { transform: scale(1.2); opacity: 0.6; }
      40%  { transform: scale(2.2); opacity: 1;   }
      100% { transform: scale(0);   opacity: 0;   }
    }

    .progress-dot.evolving {
      animation: dotevolve 0.45s ease-out forwards;
    }
  </style>
</head>
<body>
  <div class="stage">
    <div class="blob-area">
      <div class="blob-wrap" id="blobWrap">
      <svg id="blob" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" width="160" height="160">
        <path id="blobPath" fill="#F4C0D1" stroke="#D4537E" stroke-width="5" stroke-linejoin="round"/>
        <ellipse class="eye" id="eyeL" cx="82"  cy="93" rx="8" ry="8" fill="#993556"/>
        <ellipse class="eye" id="eyeR" cx="118" cy="93" rx="8" ry="8" fill="#993556"/>
        <path id="svgMouth" d="M 84 110 Q 100 130 116 110"
              stroke="#993556" stroke-width="5" fill="none" stroke-linecap="round"/>
      </svg>
      <div class="shadow" id="shadow"></div>
    </div>
    </div>

    <div class="counter">
      <span class="count" id="count">0</span>
      <span class="label">squishes</span>
    </div>

    <span class="hint" id="hint">click me!</span>
    <span class="frenzy-label" id="frenzyLabel"></span>
    <span class="frenzy-label" id="genLabel"></span>
    <div class="progress-dots" id="progressDots">
      <span class="progress-dot" id="dot0"></span>
      <span class="progress-dot" id="dot1"></span>
      <span class="progress-dot" id="dot2"></span>
      <span class="progress-dot" id="dot3"></span>
      <span class="progress-dot" id="dot4"></span>
    </div>
  </div>

  <script>
    // ── DOM refs ────────────────────────────────────────────────
    const blob        = document.getElementById('blob');
    const blobPath    = document.getElementById('blobPath');
    const svgMouth    = document.getElementById('svgMouth');
    const shadow      = document.getElementById('shadow');
    const countEl     = document.getElementById('count');
    const hint        = document.getElementById('hint');
    const wrap        = document.getElementById('blobWrap');
    const frenzyLabel = document.getElementById('frenzyLabel');
    const genLabel    = document.getElementById('genLabel');
    const dots        = [0,1,2,3,4].map(i => document.getElementById('dot' + i));

    // ── Colours — same 6 hues in same order, increasing saturation each gen ──
    const GEN_PALETTES = [
      [ // Gen 1: soft pastels
        { bg: '#F4C0D1', border: '#D4537E', dark: '#993556', count: '#D4537E', page: '#FDF6F9', darkPage: '#1a1118' },
        { bg: '#9FE1CB', border: '#1D9E75', dark: '#0F6E56', count: '#1D9E75', page: '#F2FBF7', darkPage: '#0d1a16' },
        { bg: '#FAC775', border: '#EF9F27', dark: '#BA7517', count: '#EF9F27', page: '#FFFBF2', darkPage: '#1a1608' },
        { bg: '#B5D4F4', border: '#378ADD', dark: '#185FA5', count: '#378ADD', page: '#F2F7FD', darkPage: '#0d1420' },
        { bg: '#CECBF6', border: '#7F77DD', dark: '#534AB7', count: '#7F77DD', page: '#F7F6FE', darkPage: '#110f1f' },
        { bg: '#C0DD97', border: '#639922', dark: '#3B6D11', count: '#639922', page: '#F6FAF0', darkPage: '#0e160a' },
      ],
      [ // Gen 2: richer, more saturated — same hue order
        { bg: '#EE92B2', border: '#C0245A', dark: '#850038', count: '#C0245A', page: '#FCF0F4', darkPage: '#1a0d12' },
        { bg: '#68D4B0', border: '#0A8860', dark: '#055A40', count: '#0A8860', page: '#EEFAF6', darkPage: '#071410' },
        { bg: '#F8B040', border: '#D87D00', dark: '#9A5500', count: '#D87D00', page: '#FFF8EC', darkPage: '#1a1204' },
        { bg: '#80B8EE', border: '#1360CC', dark: '#0A3C88', count: '#1360CC', page: '#EEF2FB', darkPage: '#080e1a' },
        { bg: '#A8A0EE', border: '#5248CC', dark: '#3028A0', count: '#5248CC', page: '#F0EFFD', darkPage: '#0c0b1c' },
        { bg: '#A0CC58', border: '#488000', dark: '#285000', count: '#488000', page: '#F2F8E8', darkPage: '#091004' },
      ],
      [ // Gen 3: vibrant and saturated — same hue order
        { bg: '#E8608A', border: '#A80040', dark: '#700028', count: '#A80040', page: '#FDE8EF', darkPage: '#1a080d' },
        { bg: '#30C498', border: '#007848', dark: '#004830', count: '#007848', page: '#E8F8F3', darkPage: '#061210' },
        { bg: '#F59828', border: '#C06800', dark: '#884800', count: '#C06800', page: '#FFF5E6', darkPage: '#1a1000' },
        { bg: '#4898E0', border: '#0048B0', dark: '#003080', count: '#0048B0', page: '#E8F0FA', darkPage: '#060d18' },
        { bg: '#8070E0', border: '#3820B8', dark: '#200880', count: '#3820B8', page: '#EDE8FC', darkPage: '#0a0818' },
        { bg: '#80BC30', border: '#306800', dark: '#184000', count: '#306800', page: '#EFF7E4', darkPage: '#081004' },
      ],
    ];
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)');

    // ── Confetti ─────────────────────────────────────────────────
    const CONFETTI_COLORS = ['#FF6B6B','#FF9F43','#FFD93D','#6BCB77','#4D96FF','#C77DFF','#FF6BD6','#00D2FF','#F9CA24','#6AB04C'];

    // ── Frenzy ───────────────────────────────────────────────────
    const FRENZY_LABELS = ['', '!', '!!'];
    const MAX_FRENZY    = 2;
    const FRENZY_WINDOW = 150;

    // ── Growth / evolution ───────────────────────────────────────
    const BASE_SIZE    = 160;
    const GROWTH_PX    = 25;
    const GROWTH_AT    = 10;
    const EVOLUTION_AT = 50;

    // ── SVG blob shapes ──────────────────────────────────────────
    // Gen 1 shapes are deliberately smooth — valleys no lower than ~68.
    // mutatedRadii() exaggerates deviations by ×0.5 per generation,
    // so gen 2 = ×1.5, gen 3 = ×2.0 — clearly pointier each time.
    const BLOB_SHAPE_RADII = [
      //   N    NNE  NE   ENE  E    ESE  SE   SSE  S    SSW  SW   WSW  W    WNW  NW   NNW
      [85,  85,  85,  85,  85,  85,  85,  85,  85,  85,  85,  85,  85,  85,  85,  85 ], // 0: circle
      [87,  88,  84,  79,  77,  80,  84,  88,  86,  82,  78,  77,  80,  85,  89,  87 ], // 1: organic — gentle ±8 irregularity
      [72,  74,  78,  82,  85,  86,  87,  89,  90,  89,  87,  86,  85,  82,  78,  74 ], // 2: pear — narrow top, wide south
      [83,  78,  70,  78,  83,  86,  90,  86,  83,  78,  70,  78,  83,  86,  90,  86 ], // 3: diagonal — elongated NW↔SE
      [90,  74,  68,  74,  90,  74,  68,  74,  90,  74,  68,  74,  90,  74,  68,  74 ], // 4: cross + — cardinal bulge, diagonal valley
      [68,  74,  90,  74,  68,  74,  90,  74,  68,  74,  90,  74,  68,  74,  90,  74 ], // 5: star × — diagonal bulge, cardinal valley
      [80,  74,  68,  63,  63,  65,  70,  78,  83,  87,  89,  90,  90,  89,  86,  82 ], // 6: crescent — full on left, hollow on right
      [90,  90,  89,  85,  75,  68,  68,  68,  68,  68,  68,  68,  75,  85,  89,  90 ], // 7: mushroom — wide cap, narrow base
      [90,  76,  63,  80,  87,  68,  76,  88,  63,  80,  88,  68,  63,  84,  88,  78 ], // 8: alien — each point its own
      [90,  68,  90,  68,  90,  68,  90,  68,  90,  68,  90,  68,  90,  68,  90,  68 ], // 9: eight-point star — tip/valley alternating
    ];

    // ── State ────────────────────────────────────────────────────
    let count = 0, colorIdx = 0;
    let frenzy = 0, stage = 0, generation = 0;
    let lastClick = 0;
    let decayTimer = null;
    let blobAnim = null, shadowAnim = null, faceTimer = null, morphAnim = null;
    let currentRadii = [...BLOB_SHAPE_RADII[0]];

    function colors() { return GEN_PALETTES[generation % GEN_PALETTES.length]; }

    const BASE_RADIUS = 85;
    function mutatedRadii(shapeIdx) {
      const scale = 1 + generation * 0.5;
      return BLOB_SHAPE_RADII[shapeIdx].map(r => {
        const mutated = BASE_RADIUS + (r - BASE_RADIUS) * scale;
        return Math.max(38, Math.min(92, Math.round(mutated)));
      });
    }

    // ── SVG path generation ──────────────────────────────────────
    // Smooth closed curve through radial points using Catmull-Rom → cubic bezier
    function makeBlob(radii) {
      const cx = 100, cy = 100, n = radii.length;
      const pts = radii.map((r, i) => {
        const a = -Math.PI / 2 + (i / n) * 2 * Math.PI;
        return [+(cx + r * Math.cos(a)).toFixed(2),
                +(cy + r * Math.sin(a)).toFixed(2)];
      });
      let d = `M ${pts[0][0]} ${pts[0][1]}`;
      for (let i = 0; i < n; i++) {
        const p0 = pts[(i - 1 + n) % n];
        const p1 = pts[i];
        const p2 = pts[(i + 1) % n];
        const p3 = pts[(i + 2) % n];
        const cp1x = +(p1[0] + (p2[0] - p0[0]) / 6).toFixed(2);
        const cp1y = +(p1[1] + (p2[1] - p0[1]) / 6).toFixed(2);
        const cp2x = +(p2[0] - (p3[0] - p1[0]) / 6).toFixed(2);
        const cp2y = +(p2[1] - (p3[1] - p1[1]) / 6).toFixed(2);
        d += ` C ${cp1x} ${cp1y} ${cp2x} ${cp2y} ${p2[0]} ${p2[1]}`;
      }
      return d + ' Z';
    }

    // Smooth animation between two shapes via rAF interpolation
    function animateBlob(toRadii, duration = 600) {
      if (morphAnim) cancelAnimationFrame(morphAnim);
      const fromRadii = [...currentRadii];
      currentRadii = [...toRadii];
      const start = performance.now();
      const eio = t => t < 0.5 ? 2*t*t : -1 + (4 - 2*t)*t;
      function frame(now) {
        const t = Math.min(1, (now - start) / duration);
        const radii = fromRadii.map((r, i) => r + (toRadii[i] - r) * eio(t));
        blobPath.setAttribute('d', makeBlob(radii));
        morphAnim = t < 1 ? requestAnimationFrame(frame) : null;
      }
      morphAnim = requestAnimationFrame(frame);
    }

    // ── Custom cursors ──────────────────────────────────────────
    function makeCursorURL(inner, w, h) {
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}">${inner}</svg>`;
      return 'data:image/svg+xml,' + encodeURIComponent(svg);
    }
    function setCursors(col) {
      const s = col.border;
      const arrow = makeCursorURL(
        `<path d="M 4 2 L 4 24 L 9 19 L 13 28 L 17 26 L 13 17 L 21 17 Z"` +
        ` fill="white" stroke="${s}" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>`,
        28, 30
      );
      const hand = makeCursorURL(
        `<rect x="6" y="1" width="25" height="15" rx="4" fill="white" stroke="${s}" stroke-width="2"/>` +
        `<rect x="1" y="6" width="7" height="9" rx="3.5" fill="white" stroke="${s}" stroke-width="2"/>` +
        `<rect x="7" y="14" width="5" height="14" rx="2.5" fill="white" stroke="${s}" stroke-width="2"/>` +
        `<rect x="13" y="14" width="5" height="17" rx="2.5" fill="white" stroke="${s}" stroke-width="2"/>` +
        `<rect x="19" y="14" width="5" height="15" rx="2.5" fill="white" stroke="${s}" stroke-width="2"/>` +
        `<rect x="25" y="14" width="4" height="12" rx="2" fill="white" stroke="${s}" stroke-width="2"/>`,
        32, 32
      );
      document.body.style.cursor = `url("${arrow}") 4 2, auto`;
      wrap.style.cursor = `url("${hand}") 18 2, pointer`;
    }

    // ── Colour ───────────────────────────────────────────────────
    function applyColor(c) {
      blobPath.style.fill   = c.bg;
      blobPath.style.stroke = c.border;
      shadow.style.background = c.border;
      document.querySelectorAll('.eye').forEach(e => e.style.fill = c.dark);
      svgMouth.style.stroke = c.dark;
      countEl.style.color = c.count;
      document.querySelector('.label').style.color = c.count;
      frenzyLabel.style.color = c.count;
      document.body.style.background = prefersDark.matches ? c.darkPage : c.page;
      setCursors(c);
    }
    prefersDark.addEventListener('change', () => applyColor(colors()[colorIdx]));

    // ── Frenzy ───────────────────────────────────────────────────
    function updateFrenzyLabel() {
      frenzyLabel.textContent = FRENZY_LABELS[frenzy] || '';
      frenzyLabel.style.opacity = frenzy > 0 ? '1' : '0';
    }
    function decayFrenzy() {
      if (frenzy > 0) { frenzy--; updateFrenzyLabel(); decayTimer = setTimeout(decayFrenzy, 350); }
    }

    // ── Squish animation ─────────────────────────────────────────
    function runSquish() {
      const intensity = 1 + frenzy * 0.4;
      const dur = Math.max(160, Math.round(600 / intensity));
      const sx1 = +(1 + 0.55 * intensity).toFixed(2);
      const sy1 = +Math.max(0.22, 0.5 - 0.07*(intensity-1)).toFixed(2);
      const sx2 = +(0.85 - 0.04*(intensity-1)).toFixed(2);
      const sy2 = +(1.2 + 0.12*(intensity-1)).toFixed(2);
      const sx3 = +(1.25 + 0.12*(intensity-1)).toFixed(2);
      const sy3 = +Math.max(0.55, 0.78 - 0.1*(intensity-1)).toFixed(2);

      if (blobAnim) blobAnim.cancel();
      blobAnim = blob.animate([
        { transform: 'scale(1,1)' },
        { transform: `scale(${sx1},${sy1})`, offset: 0.15 },
        { transform: `scale(${sx2},${sy2})`, offset: 0.35 },
        { transform: `scale(${sx3},${sy3})`, offset: 0.55 },
        { transform: 'scale(0.95,1.08)',     offset: 0.70 },
        { transform: 'scale(1.07,0.96)',     offset: 0.85 },
        { transform: 'scale(1,1)' },
      ], { duration: dur, easing: 'ease-out', fill: 'none' });

      const shx1 = +(1 + 0.6*intensity).toFixed(2);
      const shx2 = +(1 + 0.3*intensity).toFixed(2);
      if (shadowAnim) shadowAnim.cancel();
      shadowAnim = shadow.animate([
        { transform: 'scaleX(1)',       opacity: '0.20' },
        { transform: `scaleX(${shx1})`,opacity: '0.32', offset: 0.15 },
        { transform: 'scaleX(0.72)',    opacity: '0.10', offset: 0.35 },
        { transform: `scaleX(${shx2})`,opacity: '0.24', offset: 0.55 },
        { transform: 'scaleX(1)',       opacity: '0.20' },
      ], { duration: dur, easing: 'ease-out', fill: 'none' });

      clearTimeout(faceTimer);
      blob.classList.add('squishing');
      faceTimer = setTimeout(() => blob.classList.remove('squishing'), Math.round(dur * 0.4));
    }

    // ── Growth ───────────────────────────────────────────────────
    function getGrowthTier(n) {
      return Math.min(4, Math.floor((n % EVOLUTION_AT) / GROWTH_AT));
    }

    function applySize(n, animate) {
      const size = BASE_SIZE + getGrowthTier(n) * GROWTH_PX;
      if (!animate) {
        blob.style.transition = 'none';
        shadow.style.transition = 'none';
        requestAnimationFrame(() => { blob.style.transition = ''; shadow.style.transition = ''; });
      }
      blob.style.width  = size + 'px';
      blob.style.height = size + 'px';
      shadow.style.width = Math.round(size * 0.69) + 'px';
    }

    function updateDots(n) {
      const tier = getGrowthTier(n);
      dots.forEach((dot, i) => {
        dot.classList.remove('evolving');
        dot.classList.toggle('filled', i < tier);
      });
    }

    // ── Particles & ripples ──────────────────────────────────────
    function spawnParticles(c) {
      const rect = blob.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top  + rect.height / 2;
      for (let i = 0; i < 28; i++) {
        const el = document.createElement('div');
        el.className = 'particle';
        const col = CONFETTI_COLORS[Math.floor(Math.random() * CONFETTI_COLORS.length)];
        const s = Math.random();
        let w, h, r;
        if (s < 0.4) { w = 8+Math.random()*8; h=w; r='50%'; }
        else if (s < 0.7) { w = 7+Math.random()*7; h=w; r='3px'; }
        else { w = 5+Math.random()*5; h=12+Math.random()*8; r='2px'; }
        el.style.cssText = `width:${w}px;height:${h}px;left:${cx}px;top:${cy}px;background:${col};border-radius:${r};position:fixed;pointer-events:none;z-index:999;`;
        document.body.appendChild(el);
        const angle = (i/28)*Math.PI*2 + (Math.random()-0.5)*0.6;
        const dist  = 100 + Math.random()*140;
        const dx = Math.cos(angle)*dist, dy = Math.sin(angle)*dist;
        const rot = (Math.random()-0.5)*720;
        el.animate([
          { transform:`translate(-50%,-50%) scale(1) rotate(0deg)`, opacity:1 },
          { transform:`translate(calc(-50% + ${dx}px),calc(-50% + ${dy}px)) scale(0) rotate(${rot}deg)`, opacity:0 },
        ], { duration: 600+Math.random()*400, easing:'ease-out', fill:'forwards' })
          .finished.then(() => el.remove());
      }
    }

    function spawnRipple(c, delay) {
      setTimeout(() => {
        const rect = blob.getBoundingClientRect();
        const size = rect.width;
        const el = document.createElement('div');
        el.style.cssText = `position:fixed;border-radius:50%;border:5px solid ${c.border};pointer-events:none;z-index:998;width:${size}px;height:${size}px;left:${rect.left+size/2}px;top:${rect.top+size/2}px;`;
        document.body.appendChild(el);
        el.animate([
          { transform:'translate(-50%,-50%) scale(1)',   opacity:0.75 },
          { transform:'translate(-50%,-50%) scale(3.5)', opacity:0    },
        ], { duration:700, easing:'ease-out', fill:'forwards' })
          .finished.then(() => el.remove());
      }, delay);
    }

    function spawnGrowthRing() {
      const c = colors()[colorIdx];
      const rect = blob.getBoundingClientRect();
      const size = rect.width;
      const el = document.createElement('div');
      el.style.cssText = `position:fixed;border-radius:50%;border:3px solid ${c.border};pointer-events:none;z-index:998;width:${size}px;height:${size}px;left:${rect.left+size/2}px;top:${rect.top+size/2}px;`;
      document.body.appendChild(el);
      el.animate([
        { transform:'translate(-50%,-50%) scale(1)',   opacity:0.45 },
        { transform:'translate(-50%,-50%) scale(1.9)', opacity:0    },
      ], { duration:450, easing:'ease-out', fill:'forwards' })
        .finished.then(() => el.remove());
    }

    // ── Evolution ────────────────────────────────────────────────
    function triggerEvolution() {
      const nextStage = (stage + 1) % BLOB_SHAPE_RADII.length;
      const isNewGen  = nextStage === 0;

      if (isNewGen) {
        generation++;
        colorIdx = 0;
        applyColor(colors()[colorIdx]);
        const genNums = ['I','II','III','IV','V','VI','VII','VIII','IX','X'];
        genLabel.textContent = `GEN ${genNums[generation] || generation + 1}`;
        genLabel.style.opacity = '1';
        setTimeout(() => { genLabel.style.opacity = '0'; }, 2200);
      }

      stage = nextStage;
      const c = colors()[colorIdx];

      if (isNewGen) {
        spawnParticles(c);
        spawnParticles(c);
        spawnRipple(c, 0);
        spawnRipple(c, 150);
        spawnRipple(c, 300);
        spawnRipple(c, 450);
      } else {
        spawnParticles(c);
        spawnRipple(c, 0);
        spawnRipple(c, 180);
      }

      dots.forEach((dot, i) => {
        dot.classList.add('filled');
        setTimeout(() => {
          dot.style.background = colors()[Math.floor(Math.random()*colors().length)].bg;
          dot.classList.add('evolving');
        }, i * 40);
        setTimeout(() => { dot.classList.remove('filled','evolving'); dot.style.background=''; }, 500);
      });

      if (blobAnim) blobAnim.cancel();
      blobAnim = isNewGen
        ? blob.animate([
            { transform:'scale(1) rotate(0deg)'     },
            { transform:'scale(1.6) rotate(-8deg)',  offset:0.18 },
            { transform:'scale(0.75) rotate(6deg)',  offset:0.38 },
            { transform:'scale(1.35) rotate(-5deg)', offset:0.55 },
            { transform:'scale(0.9) rotate(3deg)',   offset:0.72 },
            { transform:'scale(1.08) rotate(-1deg)', offset:0.88 },
            { transform:'scale(1) rotate(0deg)'     },
          ], { duration:1200, easing:'ease-out', fill:'none' })
        : blob.animate([
            { transform:'scale(1) rotate(0deg)'    },
            { transform:'scale(1.4) rotate(-6deg)', offset:0.20 },
            { transform:'scale(0.82) rotate(4deg)', offset:0.42 },
            { transform:'scale(1.18) rotate(-3deg)',offset:0.62 },
            { transform:'scale(0.95) rotate(1deg)', offset:0.80 },
            { transform:'scale(1) rotate(0deg)'    },
          ], { duration:800, easing:'ease-out', fill:'none' });

      animateBlob(mutatedRadii(stage), 700);
      setTimeout(() => applySize(0, false), 50);
    }

    // ── Main click handler ───────────────────────────────────────
    function doSquish() {
      const now = Date.now();
      const gap = now - lastClick;
      lastClick = now;

      if (gap < FRENZY_WINDOW)     frenzy = Math.min(MAX_FRENZY, frenzy + 1);
      else if (gap > 600)          frenzy = Math.max(0, frenzy - 1);

      clearTimeout(decayTimer);
      decayTimer = setTimeout(decayFrenzy, 500);
      updateFrenzyLabel();
      runSquish();
      hint.classList.add('hidden');

      const prevTier = getGrowthTier(count);
      count++;
      const newTier = getGrowthTier(count);

      countEl.textContent = count;
      countEl.classList.remove('pop', 'pulse');
      void countEl.offsetWidth;
      countEl.classList.add('pop');

      colorIdx = (colorIdx + 1) % colors().length;
      applyColor(colors()[colorIdx]);

      if (count % EVOLUTION_AT === 0) {
        triggerEvolution();
      } else {
        if (newTier !== prevTier) {
          applySize(count, true);
          spawnGrowthRing();
          countEl.classList.remove('pulse');
          void countEl.offsetWidth;
          countEl.classList.add('pulse');
        }
        updateDots(count);
      }
    }

    wrap.addEventListener('click', doSquish);
    document.addEventListener('keydown', e => { if (e.code === 'Space') { e.preventDefault(); doSquish(); } });

    // ── Init ─────────────────────────────────────────────────────
    blobPath.setAttribute('d', makeBlob(currentRadii));
    applyColor(colors()[0]);
    blob.style.width  = BASE_SIZE + 'px';
    blob.style.height = BASE_SIZE + 'px';

    // ── Debug: stage picker ──────────────────────────────────────
    const debugPanel = document.createElement('div');
    debugPanel.id = 'debugPanel';
    debugPanel.style.cssText = `
      position:fixed; bottom:16px; left:50%; transform:translateX(-50%);
      display:flex; gap:6px; align-items:center;
      background:rgba(0,0,0,0.12); backdrop-filter:blur(6px);
      padding:8px 12px; border-radius:20px;
      font-family:monospace; font-size:12px;
    `;
    debugPanel.style.cssText = `
      position:fixed; bottom:16px; left:50%; transform:translateX(-50%);
      display:flex; flex-direction:column; align-items:center; gap:6px;
      background:rgba(0,0,0,0.12); backdrop-filter:blur(6px);
      padding:8px 12px; border-radius:16px;
      font-family:monospace; font-size:12px;
    `;

    // Row 1: stage
    const row1 = document.createElement('div');
    row1.style.cssText = 'display:flex; gap:6px; align-items:center;';
    debugPanel.appendChild(row1);

    const lbl = document.createElement('span');
    lbl.textContent = 'stage:';
    lbl.style.cssText = 'opacity:0.5; margin-right:2px;';
    row1.appendChild(lbl);

    const debugBtns = document.createElement('div');
    debugBtns.style.cssText = 'display:flex; gap:4px;';
    row1.appendChild(debugBtns);

    // Row 2: generation
    const row2 = document.createElement('div');
    row2.style.cssText = 'display:flex; gap:6px; align-items:center;';
    debugPanel.appendChild(row2);

    const genLbl = document.createElement('span');
    genLbl.textContent = 'gen:';
    genLbl.style.cssText = 'opacity:0.5; margin-right:2px;';
    row2.appendChild(genLbl);

    const genBtns = document.createElement('div');
    genBtns.style.cssText = 'display:flex; gap:4px;';
    row2.appendChild(genBtns);

    const genNums = ['I','II','III'];
    function updateGenBtns() {
      genBtns.querySelectorAll('button').forEach((b, j) => {
        b.style.borderColor = j === (generation % GEN_PALETTES.length)
          ? 'rgba(255,255,255,0.9)' : 'rgba(255,255,255,0.4)';
      });
    }

    genNums.forEach((label, i) => {
      const btn = document.createElement('button');
      btn.textContent = label;
      btn.style.cssText = `
        height:26px; padding: 0 6px; border-radius:13px;
        border:2px solid rgba(255,255,255,0.4);
        background:rgba(255,255,255,0.15); color:inherit;
        font:700 11px monospace; cursor:pointer;
        transition:background 0.15s;
      `;
      btn.addEventListener('mouseenter', () => btn.style.background = 'rgba(255,255,255,0.35)');
      btn.addEventListener('mouseleave', () => btn.style.background = 'rgba(255,255,255,0.15)');
      btn.addEventListener('click', () => {
        generation = i;
        applyColor(colors()[colorIdx]);
        animateBlob(mutatedRadii(stage), 500);
        updateGenBtns();
      });
      genBtns.appendChild(btn);
    });

    document.body.appendChild(debugPanel);

    BLOB_SHAPE_RADII.forEach((radii, i) => {
      const btn = document.createElement('button');
      btn.textContent = i;
      btn.style.cssText = `
        width:26px; height:26px; border-radius:50%;
        border:2px solid rgba(255,255,255,0.4);
        background:rgba(255,255,255,0.15); color:inherit;
        font:700 12px monospace; cursor:pointer;
        transition:background 0.15s;
      `;
      btn.addEventListener('mouseenter', () => btn.style.background = 'rgba(255,255,255,0.35)');
      btn.addEventListener('mouseleave', () => btn.style.background = 'rgba(255,255,255,0.15)');
      btn.addEventListener('click', () => {
        stage = i;
        animateBlob(mutatedRadii(i), 500);
        debugBtns.querySelectorAll('button').forEach((b, j) => {
          b.style.borderColor = j === i ? 'rgba(255,255,255,0.9)' : 'rgba(255,255,255,0.4)';
        });
      });
      debugBtns.appendChild(btn);
    });

    updateGenBtns();
  </script>
</body>
</html>
