<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Squish</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <link rel="manifest" href="site.webmanifest">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #FDF6F9;
      font-family: 'Fredoka One', sans-serif;
      user-select: none;
      -webkit-user-select: none;
    }

    @media (prefers-color-scheme: dark) {
      body { background: #1a1118; }
    }

    .stage {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
      padding: 2rem;
      text-align: center;
    }

    /* Squished blob — flat oval with a confused face */
    .blob-wrap {
      position: relative;
      width: 220px;
      height: 100px;
      margin-bottom: 0.5rem;
    }

    svg#blob {
      width: 100%;
      height: 100%;
      overflow: visible;
    }

    .shadow {
      width: 180px;
      height: 12px;
      border-radius: 50%;
      background: #D4537E;
      opacity: 0.18;
      margin: 6px auto 0;
    }

    .code {
      font-size: 72px;
      line-height: 1;
      color: #D4537E;
      letter-spacing: -0.02em;
    }

    @media (prefers-color-scheme: dark) {
      .code { color: #F4C0D1; }
    }

    .message {
      font-size: 22px;
      color: #D4537E;
      opacity: 0.8;
    }

    @media (prefers-color-scheme: dark) {
      .message { color: #F4C0D1; }
    }

    .sub {
      font-family: sans-serif;
      font-size: 14px;
      color: #993556;
      opacity: 0.55;
      max-width: 260px;
      line-height: 1.5;
    }

    @media (prefers-color-scheme: dark) {
      .sub { color: #F4C0D1; }
    }

    .home-btn {
      margin-top: 0.5rem;
      padding: 0.6rem 1.8rem;
      background: #F4C0D1;
      border: 3px solid #D4537E;
      border-radius: 999px;
      color: #993556;
      font-family: 'Fredoka One', sans-serif;
      font-size: 18px;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      transition: background 0.15s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    .home-btn:hover  { background: #eaadc3; }
    .home-btn:active { transform: scale(0.95); }

    @media (prefers-color-scheme: dark) {
      .home-btn {
        background: #3a2030;
        border-color: #F4C0D1;
        color: #F4C0D1;
      }
      .home-btn:hover { background: #4a2840; }
    }
  </style>
</head>
<body>
  <div class="stage">

    <div class="blob-wrap">
      <svg id="blob" viewBox="0 0 220 100" xmlns="http://www.w3.org/2000/svg">
        <!-- Squished blob body — wide flat oval -->
        <ellipse cx="110" cy="54" rx="100" ry="44" fill="#F4C0D1" stroke="#D4537E" stroke-width="4.5"/>

        <!-- Eyes -->
        <ellipse cx="90"  cy="44" rx="7" ry="7" fill="#993556"/>
        <ellipse cx="130" cy="44" rx="7" ry="7" fill="#993556"/>

        <!-- Simple frown -->
        <path d="M 88 68 Q 110 58 132 68"
              stroke="#993556" stroke-width="4" fill="none" stroke-linecap="round"/>
      </svg>
      <div class="shadow"></div>
    </div>

    <span class="code">404</span>
    <span class="message">uh oh, something got squished</span>
    <span class="sub">that page doesn't seem to exist — it might have been moved or deleted</span>
    <a class="home-btn" href="/">take me home</a>

  </div>
</body>
</html>
